name: python

on:
  push:
    paths:
      - 'miner/**'
      - 'validator/**'
      - 'client/python/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'miner/**'
      - 'validator/**'
      - 'client/python/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [miner, validator, client/python]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v
