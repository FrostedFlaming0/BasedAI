name: python

on:
  push:
    paths:
      - 'miner/**'
      - 'validator/**'
      - 'gateway/**'
      - 'scripts/devnet_e2e.py'
      - 'client/python/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'miner/**'
      - 'validator/**'
      - 'gateway/**'
      - 'scripts/devnet_e2e.py'
      - 'client/python/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [miner, validator, gateway, client/python]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.14.5'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v

  devnet-e2e:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.14.5'
          cache: 'pip'

      - name: Install deterministic devnet dependencies
        run: |
          python -m pip install --require-hashes -r validator/requirements-dev.lock
          python -m pip install --no-deps -e client/python
          python -m pip install --no-deps -e gateway
          python -m pip install --no-deps -e miner
          python -m pip install --no-deps -e validator

      - name: Run deterministic devnet E2E
        run: PYTHONPATH=client/python:gateway/src:miner/src:validator/src python scripts/devnet_e2e.py
