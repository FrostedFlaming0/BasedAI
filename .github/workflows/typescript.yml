name: typescript

on:
  push:
    paths:
      - 'client/typescript/**'
      - '.github/workflows/typescript.yml'
  pull_request:
    paths:
      - 'client/typescript/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/typescript
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-node v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.22.3'
          cache: 'npm'
          cache-dependency-path: client/typescript/package-lock.json

      - name: Install
        # Reproducible install from the lockfile only — no mutable `npm install` fallback.
        run: npm ci

      - name: Audit (fail on high+ runtime advisories)
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
