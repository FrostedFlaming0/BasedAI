name: contracts

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pin a released toolchain instead of the mutable `nightly` for reproducible CI.
          version: stable

      - name: Install dependencies
        # Submodules are checked out above; `--no-commit` keeps the pinned revisions.
        run: forge install --no-commit || true

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Coverage
        run: forge coverage --report summary
