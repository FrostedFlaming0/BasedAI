name: contracts

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Install Foundry
        # foundry-rs/foundry-toolchain v1
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d
        with:
          version: v1.7.1

      - name: Install dependencies
        run: git submodule status --recursive

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Invariants
        run: forge test --match-contract StakingSolvencyInvariantTest -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Coverage
        # --ir-minimum enables viaIR with minimal optimization; without it coverage's
        # optimizer-disabled compile hits "stack too deep" in the deploy scripts.
        run: forge coverage --ir-minimum --report summary
